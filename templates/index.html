<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Tumor Detection</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#4dabf7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 17L12 22L22 17" stroke="#4dabf7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="#4dabf7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <h1>NeuroScan</h1>
            </div>
            <p class="subtitle">Brain Tumor Detection & Classification</p>
        </header>

        <main>
            <div class="glass-panel">
                <div class="upload-section" id="uploadConfig">
                    <input type="file" id="fileInput" accept="image/*" hidden>
                    <div class="drop-zone" id="dropZone">
                        <div class="upload-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                        </div>
                        <h3>Upload MRI Scan</h3>
                        <p>Drag and drop your image here or click to browse</p>
                        <span class="file-limits">Supported formats: JPG, PNG, JPEG</span>
                    </div>
                </div>

                <div class="preview-section hidden" id="previewSection">
                    <div class="image-container">
                        <img id="imagePreview" src="" alt="MRI Preview">
                        <button class="re-upload-btn" id="reUploadBtn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="1 4 1 10 7 10"></polyline>
                                <polyline points="23 20 23 14 17 14"></polyline>
                                <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
                            </svg>
                            New Image
                        </button>
                    </div>
                    
                    <button class="primary-btn" id="analyzeBtn">
                        <span class="btn-text">Analyze Scan</span>
                        <div class="spinner hidden" id="loadingSpinner"></div>
                    </button>
                </div>

                <div class="results-section hidden" id="resultsSection">
                    <h2 class="results-title">Analysis Results</h2>
                    <div class="result-card">
                        <div class="result-item">
                            <span class="label">Detection</span>
                            <span class="value" id="predictionValue">Glioma</span>
                        </div>
                        <div class="result-item">
                            <span class="label">Confidence</span>
                            <div class="confidence-bar-container">
                                <div class="confidence-bar" id="confidenceBar"></div>
                            </div>
                            <span class="value confidence-value" id="confidenceValue">95.4%</span>
                        </div>
                    </div>
                    
                    <div id="errorMessage" class="error-message hidden">
                        <!-- Error messages appear here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
